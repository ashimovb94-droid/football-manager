name: EAS Update

on:
  push:
    branches:
      - main
    paths:
      - 'mobile/**'

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        working-directory: mobile
        run: npm install

      - name: EAS Update
        working-directory: mobile
        run: npx eas-cli update --auto --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
